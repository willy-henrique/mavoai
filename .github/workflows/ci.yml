name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Mínimo para o build não falhar em CI
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_CHAT_MODEL: ${{ secrets.AI_CHAT_MODEL }}
      EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      AI_EMBEDDING_MODEL: text-embedding-3-small
      CEREBRO_INGEST_TOKEN: ${{ secrets.CEREBRO_INGEST_TOKEN }}
      CEREBRO_INTERNAL_TOKEN: ${{ secrets.CEREBRO_INTERNAL_TOKEN }}
      INTEGRATION_AUTH_REQUIRED: "true"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start app in background
        run: npm run start &

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000/api/health --timeout 30000

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
